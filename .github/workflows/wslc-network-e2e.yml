name: WSLC network E2E

on:
  pull_request:
    paths:
      - ".github/workflows/wslc-network-e2e.yml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/wslc-network-e2e.yml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON runner labels, for example ["self-hosted","Windows","X64"] or ["windows-latest"]'
        required: false
        default: '["windows-latest"]'
      package_version:
        description: "Microsoft.WSL.Containers NuGet package version"
        required: false
        default: "2.9.3"

env:
  WSLC_SDK_PACKAGE_VERSION: ${{ inputs.package_version || '2.9.3' }}
  WSLC_RUNNER_LABELS: ${{ inputs.runner_labels || '["windows-latest"]' }}

jobs:
  alpine-echo:
    name: Pull Alpine and run echo
    runs-on: ${{ fromJSON(env.WSLC_RUNNER_LABELS) }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Microsoft WSL Containers SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "$env:WSLC_SDK_PACKAGE_VERSION"
          $sdkRoot = Join-Path $env:RUNNER_TEMP "wslc-sdk"
          New-Item -ItemType Directory -Force -Path $sdkRoot | Out-Null
          nuget install Microsoft.WSL.Containers -Version $version -OutputDirectory $sdkRoot -DirectDownload -NonInteractive
          $packageDir = Join-Path $sdkRoot "Microsoft.WSL.Containers.$version"
          $nativeDir = Join-Path $packageDir "runtimes\win-x64\native"
          if (-not (Test-Path (Join-Path $nativeDir "wslcsdk.dll"))) {
            throw "wslcsdk.dll was not found under $nativeDir"
          }
          "WSLC_NATIVE_DIR=$nativeDir" >> $env:GITHUB_ENV
          "$nativeDir" >> $env:GITHUB_PATH

      - name: Probe host registry access
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try {
            Invoke-WebRequest -Uri "https://registry-1.docker.io/v2/" -Method Head -TimeoutSec 30 | Out-Null
          } catch {
            $response = $_.Exception.Response
            if ($null -eq $response -or [int]$response.StatusCode -ne 401) {
              throw
            }
            Write-Host "Docker Hub registry probe returned 401, which confirms network reachability."
          }

      - name: Show WSLC prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "WSLC native dir: $env:WSLC_NATIVE_DIR"
          if (Get-Command wslc -ErrorAction SilentlyContinue) {
            wslc version
          } else {
            Write-Host "wslc.exe is not on PATH; Rust integration tests will load wslcsdk.dll directly."
          }
          if (Get-Command wsl -ErrorAction SilentlyContinue) {
            wsl --status
          } else {
            Write-Host "wsl.exe is not available on this runner."
          }

      - name: Run default WSLC integration tests
        shell: pwsh
        run: cargo test -p wslc --features integration --test integration_smoke

      - name: Run Docker Hub Alpine E2E
        shell: pwsh
        run: cargo test -p wslc --features integration --test integration_smoke -- --ignored --nocapture
